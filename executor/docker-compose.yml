# OpenHands 阶段4 执行器 —— docker compose（仅运行镜像，无源码）
# 用法: cp .env.example .env && docker compose up -d  →  http://localhost:3000
# 镜像版本见 ../UPSTREAMS.md 的 OpenHands IMAGE_TAG，更新时改 .env 的 OPENHANDS_TAG。
services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:${OPENHANDS_TAG:-latest}
    container_name: ai-sdlc-openhands
    pull_policy: always
    environment:
      # 运行 runtime 容器所需镜像（与上面版本对应）
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:${OPENHANDS_TAG:-latest}-nikolaik
      - LOG_ALL_EVENTS=true
      # LLM 配置走 .env（指向你的网关/模型），不要把密钥写进本文件
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
